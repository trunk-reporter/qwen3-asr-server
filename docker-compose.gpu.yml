services:
  qwen3-asr:
    image: ghcr.io/trunk-reporter/qwen3-asr-server:gpu
    ports:
      - "8765:8765"
    volumes:
      - ./qwen3-asr-p25-0.6B:/model
      - ./Qwen3-ForcedAligner-0.6B:/aligner
    environment:
      - INFERENCE_BACKEND=python
      - DEVICE=auto
      - DTYPE=bfloat16
      - SPEECH_RMS_THRESHOLD=0.01
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8765/health | jq -e '.status == \"ok\"' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s
    restart: unless-stopped
