services:
  qwen3-asr:
    image: ghcr.io/trunk-reporter/qwen3-asr-server:cpu
    ports:
      - "8765:8765"
    volumes:
      - ./qwen3-asr-p25-0.6B:/model
    environment:
      - INFERENCE_BACKEND=c
      - SPEECH_RMS_THRESHOLD=0.01
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
